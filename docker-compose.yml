
services:
  fastapi:
    build:
      context: .
      dockerfile: dockerfile
    container_name: sf_chatbot_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build:
      context: .
      dockerfile: dockerfile.streamlit
    container_name: sf_chatbot_ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - fastapi
    restart: unless-stopped

  sync:
    build:
      context: .
      dockerfile: dockerfile
    container_name: sf_chatbot_sync
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: ["python", "scripts/run_incremental_sync.py"]
    restart: unless-stopped